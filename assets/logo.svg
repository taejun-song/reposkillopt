<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="800" height="170" role="img" aria-label="RepoSkillOpt — evidence-grounded repository understanding for coding agents">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- mark: a grounded specification card -->
  <g transform="translate(28,25)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#mark)"/>
    <!-- spec lines (white) -->
    <rect x="26" y="30" width="68" height="12" rx="6" fill="#FFFFFF"/>
    <rect x="26" y="54" width="50" height="9"  rx="4.5" fill="#C7D2FE"/>
    <rect x="26" y="72" width="62" height="9"  rx="4.5" fill="#C7D2FE"/>
    <!-- citation anchor: a line tied to a grounding pin -->
    <rect x="26" y="90" width="34" height="9"  rx="4.5" fill="#C7D2FE"/>
    <circle cx="76" cy="94.5" r="6" fill="#34D399"/>
    <!-- verified badge -->
    <circle cx="98" cy="98" r="20" fill="#10B981" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M89 98 l6 6 l12 -13" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="178" y="86" font-size="50" font-weight="700" letter-spacing="-1">
      <tspan fill="#0F172A">Repo</tspan><tspan fill="#4F46E5">SkillOpt</tspan>
    </text>
    <text x="180" y="120" font-size="19" font-weight="500" fill="#64748B" letter-spacing="0.2">
      Evidence-grounded repository understanding for coding agents
    </text>
  </g>
</svg>
